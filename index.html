<!DOCTYPE html>
<html>
  <head>
    <title>@mathdugre - Home</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/icon/academicons-1.8.6/css/academicons.css" />
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <script>
      function resizeContent() {
        $(".circle").css({ height: $(".circle").css("width") });
        $("#photo").css({ height: $("#photo").css("width") });
        $("#header").css(
          { width: $("#content").css("width") } +
            parseFloat($("#content").css("grid-column-gap").split(" ")[0])
        );
        if (window.screen.width > 520 && window.screen.width <= 750) {
          $("#description").css({
            width:
              $("#photo").width() +
              parseFloat($("#content").css("grid-column-gap").split(" ")[0]) +
              $("#circle-box").width(),
          });
          console.log($("#description").css("width"));
        }
      }
      window.addEventListener("resize", resizeContent, false);

      $(function () {
        $("#header").load("header.html", function () {
          $("#home").addClass("selected");
        });
        $("#footer").load("footer.html");
        resizeContent();
      });
    </script>
  </head>

  <body>
    <div id="header"></div>

    <div id="content">
      <img id="photo" src="photo.png" alt="profile photo" />

      <div id="greetings" class="font1">
        <div style="font-size: 4em; font-weight: bold">Hello,</div>
        <div style="font-size: 2.5em">a bit about me:</div>
      </div>

      <div id="circle-box" class="font1">
        <div class="circle">
          <a href="resume.html" class="circle c1"> RESUME </a>
        </div>
        <div class="circle">
          <a
            href="https://github.com/mathdugre"
            target="_blank"
            class="circle c2"
          >
            PROJECTS
          </a>
        </div>
        <div class="circle">
          <a
            href="https://medium.com/@mathdugre"
            target="_blank"
            class="circle c3"
          >
            BLOG
          </a>
        </div>
      </div>

      <div id="description" class="font2">
        <p>
          I'm master student in computer science at Concordia University. My
          research interests are in performance and data locality of big data
          pipelines in HPC environment. In my
          free time I like to run, bake, and cook delicious food.
        </p>
      </div>
    </div>

    <div id="footer"></div>

    <script>
      $(function () {
        $("#header #home").addClass("selected");
      });
    </script>
  </body>
</html>
